global:
  image:
    pullSecrets:
      - name: ces-container-registries
networkPolicies:
  enabled: true
logLevel: info # possible values: error, warn, info and debug.
alloy:
  image:
    tag: v1.14.0
  nameOverride: "k8s-alloy"
  configReloader:
    image:
      tag: v0.90.0
    # We need the config hot reload because we always change configuration with the component custom resource. Changing config not related to the deployment does not take effekt e.g. logLevel.
    enabled: true
    securityContext: # See https://grafana.com/docs/alloy/latest/configure/nonroot/
      runAsUser: 65534
      runAsGroup: 65534
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
  controller:
    type: daemonset
    podLabels:
      app: ces
    volumes:
      extra:
        - hostPath:
            path: /var/log/pods
          name: pod-logs
        - hostPath:
            path: /var/lib/alloy
            type: DirectoryOrCreate
          name: alloy-working-state
  service:
    # We do not need this
    enabled: false
  networkPolicy:
    enabled: false
  alloy:
    # Save working state here
    storagePath: /var/lib/alloy
    enableReporting: false
    # Mount log files
    mounts:
      extra:
        - mountPath: /var/log/pods
          name: pod-logs
          readOnly: true
        - mountPath: /var/lib/alloy
          name: alloy-working-state
          readOnly: false
    securityContext:
      runAsUser: 0
      privileged: true
    resources:
      requests:
        memory: 200Mi
        cpu: 100m
      limits:
        memory: 200Mi
    configMap:
      create: false
      name: k8s-alloy
    extraEnv:
      - name: NODE_NAME
        valueFrom:
          fieldRef:
            fieldPath: spec.nodeName
      - name: LOKI_USERNAME
        valueFrom:
          secretKeyRef:
            name: k8s-loki-gateway-secret
            key: username
      - name: LOKI_PASSWORD
        valueFrom:
          secretKeyRef:
            name: k8s-loki-gateway-secret
            key: password